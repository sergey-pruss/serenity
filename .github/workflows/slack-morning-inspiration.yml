# Утреннее вдохновляющее сообщение в Slack (пн–пт, 09:00 МСК = 06:00 UTC).
# Секреты: Settings → Secrets and variables → Actions
#   SLACK_MORNING_BOT_TOKEN
#   SLACK_MORNING_CHANNEL_ID
#   SLACK_MORNING_LLM_API_KEY
#   SLACK_MORNING_LLM_MODEL (опционально)
# Гайд: docs/slack-morning-agent.html
name: Slack Morning Inspiration

on:
  schedule:
    - cron: "0 6 * * 1-5"
  workflow_dispatch:

concurrency:
  group: slack-morning-inspiration
  cancel-in-progress: false

jobs:
  morning:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Проверка секретов
        id: secrets
        env:
          BOT_TOKEN: ${{ secrets.SLACK_MORNING_BOT_TOKEN }}
          CHANNEL_ID: ${{ secrets.SLACK_MORNING_CHANNEL_ID }}
          LLM_KEY: ${{ secrets.SLACK_MORNING_LLM_API_KEY }}
        run: |
          if [[ -z "$BOT_TOKEN" || -z "$CHANNEL_ID" || -z "$LLM_KEY" ]]; then
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "::warning::Slack Morning: задайте SLACK_MORNING_BOT_TOKEN, SLACK_MORNING_CHANNEL_ID и SLACK_MORNING_LLM_API_KEY в Secrets репозитория."
            exit 0
          fi
          echo "configured=true" >> "$GITHUB_OUTPUT"

      - name: Отправить утреннее сообщение
        if: steps.secrets.outputs.configured == 'true'
        env:
          SLACK_MORNING_BOT_TOKEN: ${{ secrets.SLACK_MORNING_BOT_TOKEN }}
          SLACK_MORNING_CHANNEL_ID: ${{ secrets.SLACK_MORNING_CHANNEL_ID }}
          SLACK_MORNING_LLM_API_KEY: ${{ secrets.SLACK_MORNING_LLM_API_KEY }}
          SLACK_MORNING_LLM_MODEL: ${{ secrets.SLACK_MORNING_LLM_MODEL }}
        run: python3 integrations/slack/send_morning_message.py
