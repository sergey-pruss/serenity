    <style>
      .sa-not-found-page,
      .sa-not-found-page .sa-not-found-legacy {
        background: #191a1b;
      }
      .sa-not-found-page {
        color: #fff;
        height: 100svh;
        overflow: hidden !important;
      }
      .sa-not-found-page #body.body-application {
        display: none !important;
      }
      /* Контакты и «Следите за нами» из разметки бургер-меню: на 404 не показываем в потоке; при открытом меню (.header.active) — снова доступны. */
      .sa-not-found-page .header:not(.active) .new-static-menu .btns__modal {
        display: none !important;
      }
      .sa-not-found-page .sa-not-found-root {
        display: flex;
        flex-direction: column;
        min-height: 100svh;
      }
      .sa-not-found-page .sa-not-found-root > main + div {
        flex: 0 0 auto;
      }
      .sa-not-found-page .sa-not-found-legacy {
        position: relative;
        flex: 1 1 auto;
        display: flex;
        align-items: center;
        justify-content: flex-start;
        min-height: 542px;
        box-sizing: border-box;
        padding-top: clamp(28px, 7vh, 96px);
        padding-right: var(--page-gutter-x, 78px);
        padding-bottom: 32px;
        padding-left: var(--page-gutter-x, 78px);
        overflow: hidden;
        /* antialiased только на блоке 404, не на шапке — иначе меню визуально тоньше, чем на главной. */
        -webkit-font-smoothing: antialiased;
        text-rendering: geometricPrecision;
      }
      .sa-not-found-page .error-page__content {
        position: static;
        left: auto;
        top: auto;
        transform: none;
        width: min(520px, 100%);
        max-width: 100%;
        padding: 0;
        margin-left: 0;
        color: #fff;
      }
      .sa-not-found-page .error-page__number {
        margin: 0 0 28px;
        font-family: HeroNewBold, "Hero New", Arial, sans-serif;
        font-size: clamp(72px, 6.1vw, 92px);
        font-weight: 700;
        line-height: 0.9;
        letter-spacing: 0;
      }
      .sa-not-found-page .error-page__text {
        margin: 0;
        color: #fff;
        font-family: HeroNewMedium, "Hero New", Arial, sans-serif;
        font-size: clamp(36px, 3.25vw, 52px);
        font-weight: 500;
        line-height: 1.1;
        letter-spacing: 0;
      }
      .sa-not-found-page .sa-not-found-home-button {
        display: inline-flex;
        align-items: center;
        justify-content: space-between;
        gap: 22px;
        min-width: 210px;
        height: 54px;
        margin-top: 50px;
        padding: 0 26px 0 30px;
        border: 0;
        border-radius: 999px;
        background: #fff;
        color: #151516;
        font-family: HeroNewMedium, "Hero New", Arial, sans-serif;
        font-size: 14px;
        font-weight: 500;
        line-height: 1;
        box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.35);
        box-sizing: border-box;
        transition:
          background-color 0.2s ease,
          transform 0.2s ease;
      }
      .sa-not-found-page .sa-not-found-home-button:hover {
        background: #f2f2f2;
        transform: translateY(-1px);
      }
      .sa-not-found-page .sa-not-found-home-button svg {
        width: 16px;
        height: 13px;
        stroke: currentColor;
        flex: 0 0 auto;
      }
      /* Десктоп с горизонтальным меню (как в шапке до max-width 1250px): левый край 404 — по вертикали после лого: поле страницы + смещение колонки .header__container (max 1576px по центру) + ширина лого 130px + зазор до линии контента. */
      @media screen and (min-width: 1251px) {
        .sa-not-found-page .sa-not-found-legacy {
          padding-left: calc(
            var(--page-gutter-x, 78px) + max(0px, (100vw - 2 * var(--page-gutter-x, 78px) - 1576px) / 2) + 130px + 48px
          );
        }
      }
      @media screen and (max-width: 1024px) {
        .sa-not-found-page .sa-not-found-legacy {
          min-height: 520px;
          padding-top: clamp(24px, 6vh, 72px);
          padding-right: var(--page-gutter-x, 55px);
          padding-bottom: 32px;
          padding-left: var(--page-gutter-x, 55px);
        }
        .sa-not-found-page .error-page__content {
          width: min(520px, 100%);
        }
      }
      @media screen and (max-width: 680px) {
        .sa-not-found-page .sa-not-found-legacy {
          min-height: 430px;
          padding-top: clamp(20px, 5vh, 56px);
          padding-right: var(--page-gutter-x, 36px);
          padding-bottom: 28px;
          padding-left: var(--page-gutter-x, 36px);
        }
        .sa-not-found-page .error-page__content {
          width: min(520px, 100%);
          margin: 0;
        }
        .sa-not-found-page .error-page__number {
          margin-bottom: 20px;
          font-size: 56px;
        }
        .sa-not-found-page .error-page__text {
          font-size: 30px;
        }
        .sa-not-found-page .sa-not-found-home-button {
          min-width: 190px;
          height: 50px;
          margin-top: 46px;
        }
      }
      @media screen and (max-height: 733px) {
        .sa-not-found-page {
          height: auto;
          min-height: 100svh;
          overflow-y: auto !important;
        }
      }
