# serenity.agency progressive routing map
# 1 = serve from NEW static on 168.222.142.141
# 0 = proxy to LEGACY origin on 80.78.246.207
#
# Priority matters:
# - keep exact/specific rules above section prefixes
# - keep section prefixes above default

map $uri $is_new_page {
    default 0;

    ~^/$ 1;

    # robots/sitemap — со статики (не WordPress); иначе /robots.txt на legacy без Disallow: /docs/.
    ~^/robots\.txt$ 1;
    ~^/sitemap\.xml$ 1;

    # error_page 404 /404.html даёт внутренний запрос к /404.html; без правила сработает default 0 → снова @legacy_proxy и дефолтный nginx 404.
    ~^/404\.html$ 1;

    # Листинг /case/all (страницы, категории, пагинация) — NEW
    ~^/case/all/?$ 1;
    ~^/case/all/index\.html$ 1;
    ~^/case/all/[0-9]+/?$ 1;
    ~^/case/all/[0-9]+/index\.html$ 1;
    ~^/case/all/category/[^/]+/?$ 1;
    ~^/case/all/category/[^/]+/index\.html$ 1;
    ~^/case/all/category/[^/]+/[0-9]+/?$ 1;
    ~^/case/all/category/[^/]+/[0-9]+/index\.html$ 1;

    # docs/ — статика (/var/www/static/docs/); без правила — legacy (500 / Nuxt).
    ~^/docs(/|$) 1;

    # Блог — статика из репозитория (blog/… на диске деплоя).
    ~^/blog(/|$) 1;

    # Остальное, в т.ч. карточки /case/…, /case/all/… — legacy (default 0).
}
