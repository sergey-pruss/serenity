# serenity.agency progressive routing map
# 1 = serve from NEW static on 168.222.142.141
# 0 = proxy to LEGACY origin on 80.78.246.207
#
# Priority matters:
# - keep exact/specific rules above section prefixes
# - keep section prefixes above default

map $uri $is_new_page {
    default 0;

    ~^/$ 1;

    # robots/sitemap — со статики (не WordPress).
    ~^/robots\.txt$ 1;
    ~^/sitemap\.xml$ 1;

    # error_page 404 /404.html даёт внутренний запрос к /404.html; без правила сработает default 0 → снова @legacy_proxy и дефолтный nginx 404.
    ~^/404\.html$ 1;

    # Листинг /case/all (страницы, категории, пагинация) — NEW
    ~^/case/all/?$ 1;
    ~^/case/all/index\.html$ 1;
    ~^/case/all/[0-9]+/?$ 1;
    ~^/case/all/[0-9]+/index\.html$ 1;
    ~^/case/all/category/[^/]+/?$ 1;
    ~^/case/all/category/[^/]+/index\.html$ 1;
    ~^/case/all/category/[^/]+/[0-9]+/?$ 1;
    ~^/case/all/category/[^/]+/[0-9]+/index\.html$ 1;

    # Блог — статика из репозитория (blog/… на диске деплоя).
    ~^/blog(/|$) 1;

    # Услуги: листинг /services и /services/marketing; остальные /services/… — legacy.
    ~^/services/?$ 1;
    ~^/services/index\.html$ 1;
    ~^/services/marketing/?$ 1;
    ~^/services/marketing/index\.html$ 1;

    # Контекстная реклама — статическая страница из репозитория.
    ~^/kontekstnaya_reklama/?$ 1;
    ~^/kontekstnaya_reklama/index\.html$ 1;

    # Таргетированная реклама — статическая страница из репозитория.
    ~^/targeting/?$ 1;
    ~^/targeting/index\.html$ 1;

    # Корпоративный сайт — статическая страница из репозитория.
    ~^/korporativnyj_sajt/?$ 1;
    ~^/korporativnyj_sajt/index\.html$ 1;

    # Комплексное продвижение — статическая страница из репозитория.
    ~^/kompleksnoye-prodvizheniye/?$ 1;
    ~^/kompleksnoye-prodvizheniye/index\.html$ 1;

    # SMM-продвижение — статическая страница из репозитория.
    ~^/smm_marketing/?$ 1;
    ~^/smm_marketing/index\.html$ 1;

    # Остальное, в т.ч. карточки /case/…, /case/all/… — legacy (default 0).
}
