# serenity.agency progressive routing map
# 1 = serve from NEW static on 168.222.142.141
# 0 = proxy to LEGACY origin on 80.78.246.207
#
# Priority matters:
# - keep exact/specific rules above section prefixes
# - keep section prefixes above default

map $uri $is_new_page {
    default 0;

    # Homepage on NEW
    ~^/$ 1;

    # robots/sitemap со статического деплоя (не WordPress). Иначе /robots.txt уходит на legacy без Disallow: /docs/.
    ~^/robots\.txt$ 1;
    ~^/sitemap\.xml$ 1;

    # Case listing pages on NEW only:
    # /case/all
    # /case/all/index.html
    # /case/all/2
    # /case/all/2/index.html
    # /case/all/category/{code}
    # /case/all/category/{code}/index.html
    # /case/all/category/{code}/2
    # /case/all/category/{code}/2/index.html
    ~^/case/all/?$ 1;
    ~^/case/all/index\.html$ 1;
    ~^/case/all/[0-9]+/?$ 1;
    ~^/case/all/[0-9]+/index\.html$ 1;
    ~^/case/all/category/[^/]+/?$ 1;
    ~^/case/all/category/[^/]+/index\.html$ 1;
    ~^/case/all/category/[^/]+/[0-9]+/?$ 1;
    ~^/case/all/category/[^/]+/[0-9]+/index\.html$ 1;

    # Справочник docs/ на статике (/var/www/static/docs/ после deploy.sh). Покрывает /docs и /docs/…
    # Без этого URI попадает в legacy (500 / Nuxt).
    ~^/docs(/|$) 1;

    # Услуги: нативные статические страницы под /services/… (иначе уйдут в legacy WordPress).
    ~^/services/?$ 1;
    ~^/services/index\.html$ 1;
    ~^/services/production/?$ 1;
    ~^/services/production/index\.html$ 1;

    # Листинг блога на статике: /blog, рубрики и пагинация (не трогаем /blog/article/slug — лишний сегмент)
    ~^/blog/?$ 1;
    ~^/blog/index\.html$ 1;
    ~^/blog/[0-9]+/?$ 1;
    ~^/blog/[0-9]+/index\.html$ 1;
    ~^/blog/(life|case|article|podcast)/?$ 1;
    ~^/blog/(life|case|article|podcast)/index\.html$ 1;
    ~^/blog/(life|case|article|podcast)/[0-9]+/?$ 1;
    ~^/blog/(life|case|article|podcast)/[0-9]+/index\.html$ 1;

    # Статические посты /blog/article/<slug>/ (slug с буквами — не только пагинация)
    ~^/blog/article/[^/]*[a-zA-Z][^/]*/?$ 1;
    ~^/blog/article/[^/]*[a-zA-Z][^/]*/index\.html$ 1;

    # Individual case pages remain on LEGACY via default 0:
    # - /case/<slug>
    # - /case/all/<slug>

}
