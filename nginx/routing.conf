# serenity.agency progressive routing map
# 1 = serve from NEW static on 168.222.142.141
# 0 = proxy to LEGACY origin on 80.78.246.207
#
# Priority matters:
# - keep exact/specific rules above section prefixes
# - keep section prefixes above default

map $uri $is_new_page {
    default 0;

    # Homepage on NEW
    ~^/$ 1;

    # Case listing pages on NEW only:
    # /case/all
    # /case/all/index.html
    # /case/all/2
    # /case/all/2/index.html
    # /case/all/category/{code}
    # /case/all/category/{code}/index.html
    # /case/all/category/{code}/2
    # /case/all/category/{code}/2/index.html
    ~^/case/all/?$ 1;
    ~^/case/all/index\.html$ 1;
    ~^/case/all/[0-9]+/?$ 1;
    ~^/case/all/[0-9]+/index\.html$ 1;
    ~^/case/all/category/[^/]+/?$ 1;
    ~^/case/all/category/[^/]+/index\.html$ 1;
    ~^/case/all/category/[^/]+/[0-9]+/?$ 1;
    ~^/case/all/category/[^/]+/[0-9]+/index\.html$ 1;

    # Справочник docs/ на статике (/var/www/static/docs/ после deploy.sh). Без этого URI
    # попадает в legacy и может дать 500.
    ~^/docs/ 1;

    # Individual case pages remain on LEGACY via default 0:
    # - /case/<slug>
    # - /case/all/<slug>

    # Example section rollout (enable when fully ready)
    # ~^/blog($|/) 1;
}
