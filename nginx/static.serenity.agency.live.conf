# Превью static.serenity.agency на 168.222.142.141 (зеркало sites-available/static).
# Важно: те же URL `/_sa/*`, что и на основном домене, но отдельный dev-root /var/www/static-dev.
# Legacy Nuxt для сравнения: /korporativnyj_sajt?legacy=1 (CDN whitelist: v, legacy).

upstream serenity_legacy_origin_preview {
    server 80.78.246.207:443;
    keepalive 8;
}

server {
    server_name static.serenity.agency;
    add_header X-Robots-Tag "noindex, nofollow" always;
    root /var/www/static-dev;
    index index.html;
    error_page 404 /404.html;

    listen 443 ssl http2;
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;

    gzip on;
    gzip_comp_level 5;
    gzip_min_length 1024;
    gzip_vary on;
    gzip_proxied any;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml;

    # HTML preview: s-maxage=300 — Yandex CDN отдаёт с edge 5 мин без origin; max-age=0 — браузер ревалидирует.
    # Без no-store (AGENTS.md). После deploy-dev — yc cdn cache purge или ждать TTL.
    location = /index.html {
        add_header Cache-Control "public, max-age=0, s-maxage=300, must-revalidate";
        add_header X-Robots-Tag "noindex, nofollow" always;
    }

    location = /404.html {
        add_header Cache-Control "public, max-age=0, s-maxage=300, must-revalidate";
        add_header X-Robots-Tag "noindex, nofollow" always;
    }

    # Услуги — канон без слэша (как на serenity.agency).
    location = /targeting {
        add_header Cache-Control "public, max-age=0, s-maxage=300, must-revalidate";
        add_header X-Robots-Tag "noindex, nofollow" always;
        try_files /targeting/index.html =404;
    }
    location = /targeting/ {
        return 301 $scheme://$host/targeting$is_args$args;
    }
    location = /kontekstnaya_reklama {
        add_header Cache-Control "public, max-age=0, s-maxage=300, must-revalidate";
        add_header X-Robots-Tag "noindex, nofollow" always;
        try_files /kontekstnaya_reklama/index.html =404;
    }
    location = /kontekstnaya_reklama/ {
        return 301 $scheme://$host/kontekstnaya_reklama$is_args$args;
    }
    location = /strategy {
        add_header Cache-Control "public, max-age=0, s-maxage=300, must-revalidate";
        add_header X-Robots-Tag "noindex, nofollow" always;
        try_files /strategy/index.html =404;
    }
    location = /strategy/ {
        return 301 $scheme://$host/strategy$is_args$args;
    }
    location = /services {
        add_header Cache-Control "public, max-age=0, s-maxage=300, must-revalidate";
        add_header X-Robots-Tag "noindex, nofollow" always;
        try_files /services/index.html =404;
    }
    location = /services/ {
        return 301 $scheme://$host/services$is_args$args;
    }
    location = /korporativnyj_sajt/ {
        return 301 $scheme://$host/korporativnyj_sajt$is_args$args;
    }

    location = /blog {
        add_header Cache-Control "public, max-age=0, s-maxage=300, must-revalidate";
        add_header X-Robots-Tag "noindex, nofollow" always;
        try_files /blog/index.html =404;
    }
    location = /blog/ {
        return 301 $scheme://$host/blog$is_args$args;
    }
    location ~ ^(/blog/.+)/$ {
        return 301 $scheme://$host$1$is_args$args;
    }
    location = /case/all {
        add_header Cache-Control "public, max-age=0, s-maxage=300, must-revalidate";
        add_header X-Robots-Tag "noindex, nofollow" always;
        try_files /case/all/index.html =404;
    }
    location = /case/all/ {
        return 301 $scheme://$host/case/all$is_args$args;
    }
    location ~ ^(/case/all/[0-9]+)/$ {
        return 301 $scheme://$host$1$is_args$args;
    }
    location ~ ^/case/all/[0-9]+$ {
        add_header Cache-Control "public, max-age=0, s-maxage=300, must-revalidate";
        add_header X-Robots-Tag "noindex, nofollow" always;
        try_files $uri/index.html =404;
    }
    location ~ ^(/case/all/category/[^/]+)/$ {
        return 301 $scheme://$host$1$is_args$args;
    }
    location ~ ^/case/all/category/[^/]+$ {
        add_header Cache-Control "public, max-age=0, s-maxage=300, must-revalidate";
        add_header X-Robots-Tag "noindex, nofollow" always;
        try_files $uri/index.html =404;
    }
    location ~ ^(/case/all/category/[^/]+/[0-9]+)/$ {
        return 301 $scheme://$host$1$is_args$args;
    }
    location ~ ^/case/all/category/[^/]+/[0-9]+$ {
        add_header Cache-Control "public, max-age=0, s-maxage=300, must-revalidate";
        add_header X-Robots-Tag "noindex, nofollow" always;
        try_files $uri/index.html =404;
    }

    # Не использовать корневой robots.txt (правила продакшена): на превью закрываем всё.
    location = /robots.txt {
        alias /var/www/static-dev/robots.static-preview.txt;
        default_type text/plain;
        access_log off;
        add_header X-Robots-Tag "noindex, nofollow" always;
    }

    location ^~ /_sa/ {
        alias /var/www/static-dev/;
        add_header X-Robots-Tag "noindex, nofollow" always;
        expires 365d;
        add_header Cache-Control "public, max-age=31536000, immutable";
        access_log off;
    }

    # Legacy Nuxt «Корпоративный сайт»: ?legacy=1 или ?v=legacy-preview (оба в whitelist CDN).
    # Статика: /korporativnyj_sajt без этих query. Префикс /legacy/… → 301 на ?legacy=1.
    location = /legacy/korporativnyj_sajt/ {
        return 301 $scheme://$host/korporativnyj_sajt?legacy=1;
    }
    location = /legacy/korporativnyj_sajt {
        return 301 $scheme://$host/korporativnyj_sajt?legacy=1;
    }
    location = /korporativnyj_sajt {
        if ($arg_legacy = "1") {
            rewrite ^ /__korporativnyj_sajt_legacy_preview last;
        }
        if ($arg_v = "legacy-preview") {
            rewrite ^ /__korporativnyj_sajt_legacy_preview last;
        }
        add_header Cache-Control "public, max-age=0, s-maxage=300, must-revalidate";
        add_header X-Robots-Tag "noindex, nofollow" always;
        try_files /korporativnyj_sajt/index.html =404;
    }
    location = /__korporativnyj_sajt_legacy_preview {
        internal;
        add_header Cache-Control "no-cache, max-age=0, must-revalidate";
        add_header X-Robots-Tag "noindex, nofollow" always;
        proxy_http_version 1.1;
        proxy_set_header Host serenity.agency;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header Accept-Encoding "";
        proxy_read_timeout 30s;
        proxy_connect_timeout 10s;
        proxy_ssl_server_name on;
        proxy_ssl_name serenity.agency;
        proxy_ssl_verify off;
        proxy_pass https://serenity_legacy_origin_preview/korporativnyj_sajt;
    }
    location ^~ /_nuxt/ {
        add_header Cache-Control "no-cache, max-age=0, must-revalidate";
        add_header X-Robots-Tag "noindex, nofollow" always;
        proxy_http_version 1.1;
        proxy_set_header Host serenity.agency;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header Accept-Encoding "";
        proxy_read_timeout 30s;
        proxy_connect_timeout 10s;
        proxy_ssl_server_name on;
        proxy_ssl_name serenity.agency;
        proxy_ssl_verify off;
        proxy_pass https://serenity_legacy_origin_preview;
    }
    location ^~ /storage/ {
        add_header Cache-Control "no-cache, max-age=0, must-revalidate";
        add_header X-Robots-Tag "noindex, nofollow" always;
        proxy_http_version 1.1;
        proxy_set_header Host serenity.agency;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header Accept-Encoding "";
        proxy_read_timeout 30s;
        proxy_connect_timeout 10s;
        proxy_ssl_server_name on;
        proxy_ssl_name serenity.agency;
        proxy_ssl_verify off;
        proxy_pass https://serenity_legacy_origin_preview;
    }
    # SEO-дашборд перенесён на dashboard.serenity.agency
    location = /docs/seo-rank-dashboard.html {
        return 301 https://dashboard.serenity.agency/;
    }

    # SEO-документы (ТЗ, аудиты, gap-отчёты, handbook) перенесены в dashboard.serenity.agency/docs/
    location = /docs/team-handbook.html { return 301 https://dashboard.serenity.agency$request_uri; }
    location = /docs/seo-serp-commands.html { return 301 https://dashboard.serenity.agency$request_uri; }
    location = /docs/seo-positions-mcp-workflows.md { return 301 https://dashboard.serenity.agency$request_uri; }
    location = /docs/korporativnyj-serp-content-gap.html { return 301 https://dashboard.serenity.agency$request_uri; }
    location = /docs/targeting-serp-content-gap.html { return 301 https://dashboard.serenity.agency$request_uri; }
    location = /docs/kontekstnaya-serp-content-gap.html { return 301 https://dashboard.serenity.agency$request_uri; }
    location = /docs/korporativnyj-sajt-onepage-seo-tz.html { return 301 https://dashboard.serenity.agency$request_uri; }
    location = /docs/smm-marketing-onepage-seo-tz.html { return 301 https://dashboard.serenity.agency$request_uri; }
    location = /docs/kompleksnoye-prodvizheniye-onepage-seo-tz.html { return 301 https://dashboard.serenity.agency$request_uri; }
    location = /docs/home-onepage-seo-tz.html { return 301 https://dashboard.serenity.agency$request_uri; }
    location = /docs/marketing-onepage-seo-tz.html { return 301 https://dashboard.serenity.agency$request_uri; }
    location = /docs/kontekstnaya-seo-strategy-top10.html { return 301 https://dashboard.serenity.agency$request_uri; }
    location = /docs/kontekstnaya-seo-post-deploy-checklist.html { return 301 https://dashboard.serenity.agency$request_uri; }
    location = /docs/seo-migration-sheet-import.csv { return 301 https://dashboard.serenity.agency$request_uri; }

    # Справочники docs/ — только dev (static-dev). Явный префикс над location /.
    location ^~ /docs/ {
        add_header X-Robots-Tag "noindex, nofollow" always;
        add_header Cache-Control "public, max-age=0, s-maxage=300, must-revalidate";
        try_files $uri $uri/ =404;
    }

    location ~* ^(?!/_nuxt/)(?!/_sa/).*\.(css|js|woff2|woff|png|jpg|jpeg|webp|svg|gif|ico|mp4)$ {
        add_header X-Robots-Tag "noindex, nofollow" always;
        expires 365d;
        add_header Cache-Control "public, max-age=31536000, immutable";
        access_log off;
    }

    # Без ^~: иначе location ~ ^(/blog/.+)/$ выше не срабатывает.
    location /blog {
        add_header X-Robots-Tag "noindex, nofollow" always;
        add_header Cache-Control "public, max-age=0, s-maxage=300, must-revalidate";
        try_files $uri $uri/index.html =404;
    }

    location / {
        add_header X-Robots-Tag "noindex, nofollow" always;
        add_header Cache-Control "public, max-age=0, s-maxage=300, must-revalidate";
        try_files $uri $uri/ =404;
    }

    ssl_certificate /etc/letsencrypt/live/static.serenity.agency/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/static.serenity.agency/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
}

server {
    if ($host = static.serenity.agency) {
        return 301 https://$host$request_uri;
    }

    listen 80;
    server_name static.serenity.agency;
    return 404;
}
