# Превью static.serenity.agency на 168.222.142.141 (зеркало sites-available/static).
# Важно: те же URL `/_sa/*`, что и на основном домене — через alias на /var/www/static.

server {
    server_name static.serenity.agency;
    add_header X-Robots-Tag "noindex, nofollow" always;
    root /var/www/static;
    index index.html;

    listen 443 ssl http2;
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;

    gzip on;
    gzip_comp_level 5;
    gzip_min_length 1024;
    gzip_vary on;
    gzip_proxied any;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml;

    location = /index.html {
        expires -1;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header X-Robots-Tag "noindex, nofollow" always;
    }

    # Не использовать корневой robots.txt (правила продакшена): на превью закрываем всё.
    location = /robots.txt {
        alias /var/www/static/robots.static-preview.txt;
        default_type text/plain;
        access_log off;
        add_header X-Robots-Tag "noindex, nofollow" always;
    }

    location ^~ /_sa/ {
        alias /var/www/static/;
        add_header X-Robots-Tag "noindex, nofollow" always;
        expires 365d;
        add_header Cache-Control "public, max-age=31536000, immutable";
        access_log off;
    }

    # Справочники из репозитория docs/ (как на основном vhost). Явный префикс над location /.
    location ^~ /docs/ {
        add_header X-Robots-Tag "noindex, nofollow" always;
        expires -1;
        add_header Cache-Control "no-cache, max-age=0, must-revalidate";
        try_files $uri $uri/ =404;
    }

    location ~* \.(css|js|woff2|png|jpg|jpeg|webp|svg|gif|ico|mp4)$ {
        add_header X-Robots-Tag "noindex, nofollow" always;
        expires 365d;
        add_header Cache-Control "public, max-age=31536000, immutable";
        access_log off;
    }

    location / {
        add_header X-Robots-Tag "noindex, nofollow" always;
        try_files $uri $uri/ /index.html;
    }

    ssl_certificate /etc/letsencrypt/live/static.serenity.agency/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/static.serenity.agency/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
}

server {
    if ($host = static.serenity.agency) {
        return 301 https://$host$request_uri;
    }

    listen 80;
    server_name static.serenity.agency;
    return 404;
}
