# Текущий прод: /etc/nginx/sites-available/serenity-router на 168.222.142.141
# Legacy по HTTPS :443 — обязательно, иначе 301 Location на основной домен → циклит на edge.
#
# Общие location — serenity-router-snapshot.inc (деплой скриптом рядом с этим файлом).
# HTTP :80 не редиректит на https://serenity.agency: при origin CDN по HTTP иначе Yandex
# следует за 301 на публичное имя и даёт «cdn loop detected».

upstream serenity_legacy_origin {
    server 80.78.246.207:443;
    keepalive 16;
}

server {
    listen [::]:443 ssl ipv6only=on default_server;
    listen 443 ssl default_server;
    server_name serenity.agency www.serenity.agency;

    ssl_certificate /etc/letsencrypt/live/serenity.agency/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/serenity.agency/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    if ($host = www.serenity.agency) {
        return 301 https://serenity.agency$request_uri;
    }

    include /etc/nginx/serenity-router-snapshot.inc;
}

server {
    listen 80;
    listen [::]:80;
    server_name serenity.agency www.serenity.agency;

    include /etc/nginx/serenity-router-snapshot.inc;
}
