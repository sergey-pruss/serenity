# Текущий прод: /etc/nginx/sites-available/serenity-router на 168.222.142.141
# Legacy по HTTPS :443 — обязательно, иначе 301 Location на основной домен → цикл на edge.

upstream serenity_legacy_origin {
    server 80.78.246.207:443;
    keepalive 16;
}

server {
    server_name serenity.agency;

    # Цепочка 404: intercept в @legacy_proxy → @serenity_static_404 → без этого второй error_page не отрабатывает.
    recursive_error_pages on;

    root /var/www/static;
    index index.html;
    # Не error_page 404 /404.html: внутренний URI /404.html снова попадает в location / и map default 0 → @legacy_proxy → дефолтный nginx 404.
    error_page 404 @serenity_static_404;

    location @serenity_static_404 {
        # Явный путь: не дублировать root с уровнем server (иначе на части сборок nginx ищет /var/www/static/var/www/static/404.html — см. error.log open() … failed).
        root /var/www;
        rewrite ^ /static/404.html break;
    }

    # Текстовые ответы: gzip по запросу клиента (Accept-Encoding). Файлы на диске не меняются.
    gzip on;
    gzip_vary on;
    gzip_min_length 256;
    gzip_comp_level 5;
    gzip_http_version 1.1;
    gzip_proxied any;
    # MIME главной страницы в списке не дублируем — иначе nginx предупреждает о повторе типа (дефолт от gzip в http{}).
    gzip_types
        text/plain
        text/css
        text/xml
        application/javascript
        application/json
        application/xml
        application/rss+xml
        image/svg+xml;

    location = /robots.txt {
        alias /var/www/static/robots.production.txt;
        default_type text/plain;
        access_log off;
    }

    # Карта сайта из статического деплоя (не WordPress — там нет страниц нового каталога /case/all/…)
    location = /sitemap.xml {
        alias /var/www/static/sitemap.xml;
        default_type application/xml;
        charset utf-8;
        access_log off;
    }

    # Канон главной — только / (не /index.html). Редирект только при прямом запросе клиента:
    # иначе внутренний редирект try_files / → index.html попадает сюда и даёт петлю 301 → /.
    location = /index.html {
        if ($request_uri ~* ^/index\.html(\?|$)) {
            return 301 https://serenity.agency/;
        }
    }

    location = /404.html {
        expires -1;
        add_header Cache-Control "no-cache, max-age=0, must-revalidate";
    }

    # Снимок нового сайта только под /_sa/ — без перехвата корневых /css /js /img /json (иначе ломается legacy WordPress).
    location ^~ /_sa/ {
        alias /var/www/static/;
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    location ^~ /api/ {
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_ssl_server_name on;
        proxy_ssl_name serenity.agency;
        proxy_ssl_verify off;
        proxy_pass https://serenity_legacy_origin;
    }

    # Справочники docs/ → /var/www/static/docs/ после scripts/deploy-prod.sh (или deploy-dev). Префикс обходит legacy-прокси.
    # Дублируется в nginx/routing.conf (~^/docs(/|$)) на случай старого vhost — выкладка: scripts/deploy-serenity-router-vhost.sh
    location ^~ /docs/ {
        expires -1;
        add_header Cache-Control "no-cache, max-age=0, must-revalidate";
        add_header X-Robots-Tag "noindex, nofollow" always;
        try_files $uri $uri/ =404;
    }

    # Канон листинга блога — /blog/ (как /case/all/): со старого WP часто приходит href="/blog" без слэша → иначе в браузере остаётся «плоский» URL и смешение с legacy.
    location = /blog {
        return 308 https://serenity.agency/blog/$is_args$args;
    }

    # Статья снята со статики (см. docs/sitemap-removed-urls.txt) — без редиректа был бы 404 и «нет canonical» в Вебмастере.
    location = /blog/article/7-raz-otmer-kak-sozdat-effektivnyj-sajt-dlya-biznesa {
        return 301 https://serenity.agency/blog/article/;
    }
    location = /blog/article/7-raz-otmer-kak-sozdat-effektivnyj-sajt-dlya-biznesa/ {
        return 301 https://serenity.agency/blog/article/;
    }

    # Edge до legacy: 5xx в GSC (семинар, information, битый /blog/null/…). Только новый сервер; список — json/nginx-edge-intercepts.json + scripts/verify-nginx-edge-intercepts.cjs
    location = /seminar/7 {
        return 301 https://serenity.agency/blog/;
    }
    location = /seminar/7/ {
        return 301 https://serenity.agency/blog/;
    }
    location = /information/uslugi-marketingovyh-agentstv-v-rossii {
        return 301 https://serenity.agency/blog/article/;
    }
    location = /information/uslugi-marketingovyh-agentstv-v-rossii/ {
        return 301 https://serenity.agency/blog/article/;
    }
    location = /information/chto-takoe-brend-i-kak-ego-sozdat {
        return 301 https://serenity.agency/blog/article/;
    }
    location = /information/chto-takoe-brend-i-kak-ego-sozdat/ {
        return 301 https://serenity.agency/blog/article/;
    }
    location = /information/internet-marketing {
        return 301 https://serenity.agency/blog/article/;
    }
    location = /information/internet-marketing/ {
        return 301 https://serenity.agency/blog/article/;
    }
    location = /blog/null/preimushhestva-kompleksnogo-marketinga {
        return 301 https://serenity.agency/blog/article/;
    }
    location = /blog/null/preimushhestva-kompleksnogo-marketinga/ {
        return 301 https://serenity.agency/blog/article/;
    }

    # Блог → /var/www/static/blog/… Обходит location / + map: иначе при устаревшем conf.d/serenity-routing.conf запрос уходит в legacy (Nuxt).
    # Согласовано с nginx/routing.conf (~^/blog(/|$)). Выкладка: scripts/deploy-serenity-router-vhost.sh
    location ^~ /blog {
        expires -1;
        add_header Cache-Control "no-cache, max-age=0, must-revalidate";
        try_files $uri $uri/ =404;
    }

    error_page 419 = @legacy_proxy;

    location / {
        if ($is_new_page = 0) {
            return 419;
        }
        expires -1;
        add_header Cache-Control "no-cache, max-age=0, must-revalidate";
        try_files $uri $uri/ =404;
    }

    location @legacy_proxy {
        # Явно здесь: иначе с named @legacy_proxy не всегда срабатывает наследуемый с уровня server error_page для intercept.
        error_page 404 @serenity_static_404;
        proxy_http_version 1.1;
        proxy_intercept_errors on;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Accept-Encoding "";
        proxy_read_timeout 30s;
        proxy_connect_timeout 10s;
        proxy_ssl_server_name on;
        proxy_ssl_name serenity.agency;
        proxy_ssl_verify off;
        sub_filter_once off;
        sub_filter '<a href="/case/all"' '<a href="/case/all/"';
        sub_filter '<a href="/blog"' '<a href="/blog/"';
        sub_filter 'href="https://serenity.agency/blog"' 'href="https://serenity.agency/blog/"';
        sub_filter 'href="http://serenity.agency/blog"' 'href="http://serenity.agency/blog/"';
        sub_filter '</body>' '<script>(function(){function normalize(href){if(href==="/case/all"||href==="https://serenity.agency/case/all"||href==="http://serenity.agency/case/all")return"/case/all/";if(href==="/blog"||href==="https://serenity.agency/blog"||href==="http://serenity.agency/blog")return"/blog/";if(href==="/"||href==="https://serenity.agency/"||href==="http://serenity.agency/"||href==="https://serenity.agency"||href==="http://serenity.agency")return"/";return"";}document.addEventListener("click",function(e){var t=e.target;var a=t&&t.closest?t.closest("a[href]"):null;if(!a)return;var target=normalize(a.getAttribute("href"));if(!target)return;e.preventDefault();window.location.assign(target);},true);})();</script></body>';
        proxy_pass https://serenity_legacy_origin;
    }

    listen [::]:443 ssl ipv6only=on;
    listen 443 ssl;
    ssl_certificate /etc/letsencrypt/live/serenity.agency/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/serenity.agency/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name www.serenity.agency;

    ssl_certificate /etc/letsencrypt/live/serenity.agency/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/serenity.agency/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    return 301 https://serenity.agency$request_uri;
}


server {
    listen 80;
    listen [::]:80;
    server_name serenity.agency;
    return 301 https://serenity.agency$request_uri;
}

server {
    listen 80;
    listen [::]:80;
    server_name www.serenity.agency;
    return 301 https://serenity.agency$request_uri;
}
