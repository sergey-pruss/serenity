# Текущий прод: /etc/nginx/sites-available/serenity-router на 168.222.142.141
# Legacy по HTTPS :443 — обязательно, иначе 301 Location на основной домен → цикл на edge.

upstream serenity_legacy_origin {
    server 80.78.246.207:443;
    keepalive 16;
}

server {
    server_name serenity.agency www.serenity.agency;

    root /var/www/static;
    index index.html;

    location = /robots.txt {
        alias /var/www/static/robots.production.txt;
        default_type text/plain;
        access_log off;
    }

    # Карта сайта из статического деплоя (не WordPress — там нет страниц нового каталога /case/all/…)
    location = /sitemap.xml {
        alias /var/www/static/sitemap.xml;
        default_type application/xml;
        charset utf-8;
        access_log off;
    }

    # Статика нового сайта (иначе /img/* уходит в legacy и ломает шрифты/CSS)
    location ^~ /css/ {
        try_files $uri =404;
    }
    location ^~ /js/ {
        try_files $uri =404;
    }
    location ^~ /img/ {
        try_files $uri =404;
    }
    location ^~ /json/ {
        try_files $uri =404;
    }

    location ^~ /api/ {
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_ssl_server_name on;
        proxy_ssl_name serenity.agency;
        proxy_ssl_verify off;
        proxy_pass https://serenity_legacy_origin;
    }

    error_page 419 = @legacy_proxy;

    location / {
        if ($is_new_page = 0) {
            return 419;
        }
        try_files $uri $uri/ =404;
    }

    location @legacy_proxy {
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
        proxy_connect_timeout 10s;
        proxy_ssl_server_name on;
        proxy_ssl_name serenity.agency;
        proxy_ssl_verify off;
        proxy_pass https://serenity_legacy_origin;
    }

    listen [::]:443 ssl ipv6only=on;
    listen 443 ssl;
    ssl_certificate /etc/letsencrypt/live/serenity.agency/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/serenity.agency/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
}


server {
    if ($host = www.serenity.agency) {
        return 301 https://$host$request_uri;
    }


    if ($host = serenity.agency) {
        return 301 https://$host$request_uri;
    }


    listen 80;
    listen [::]:80;
    server_name serenity.agency www.serenity.agency;
    return 404;
}
