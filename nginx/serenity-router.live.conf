# Текущий прод: /etc/nginx/sites-available/serenity-router на 168.222.142.141
# Legacy по HTTPS :443 — обязательно, иначе 301 Location на основной домен → цикл на edge.

upstream serenity_legacy_origin {
    server 80.78.246.207:443;
    keepalive 16;
}

# Канонический хост — serenity.agency (без www). Сертификат Let’s Encrypt должен покрывать www для этого блока.
server {
    listen [::]:443 ssl ipv6only=on;
    listen 443 ssl;
    server_name www.serenity.agency;

    ssl_certificate /etc/letsencrypt/live/serenity.agency/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/serenity.agency/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    return 301 https://serenity.agency$request_uri;
}

server {
    server_name serenity.agency;

    root /var/www/static;
    index index.html;

    # Текстовые ответы: gzip по запросу клиента (Accept-Encoding). Файлы на диске не меняются.
    gzip on;
    gzip_vary on;
    gzip_min_length 256;
    gzip_comp_level 5;
    gzip_http_version 1.1;
    gzip_proxied any;
    # MIME главной страницы в списке не дублируем — иначе nginx предупреждает о повторе типа (дефолт от gzip в http{}).
    gzip_types
        text/plain
        text/css
        text/xml
        application/javascript
        application/json
        application/xml
        application/rss+xml
        image/svg+xml;

    location = /robots.txt {
        alias /var/www/static/robots.production.txt;
        default_type text/plain;
        access_log off;
    }

    # Карта сайта из статического деплоя (не WordPress — там нет страниц нового каталога /case/all/…)
    location = /sitemap.xml {
        alias /var/www/static/sitemap.xml;
        default_type application/xml;
        charset utf-8;
        access_log off;
    }

    # Снимок нового сайта только под /_sa/ — без перехвата корневых /css /js /img /json (иначе ломается legacy WordPress).
    location ^~ /_sa/ {
        alias /var/www/static/;
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    location ^~ /api/ {
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_ssl_server_name on;
        proxy_ssl_name serenity.agency;
        proxy_ssl_verify off;
        proxy_pass https://serenity_legacy_origin;
    }

    # Справочники docs/ → /var/www/static/docs/ после deploy.sh. Префикс обходит legacy-прокси.
    # Дублируется в nginx/routing.conf (~^/docs(/|$)) на случай старого vhost — выкладка: scripts/deploy-serenity-router-vhost.sh
    location ^~ /docs/ {
        expires -1;
        add_header Cache-Control "no-cache, max-age=0, must-revalidate";
        add_header X-Robots-Tag "noindex, nofollow" always;
        try_files $uri $uri/ =404;
    }

    error_page 419 = @legacy_proxy;

    location / {
        if ($is_new_page = 0) {
            return 419;
        }
        expires -1;
        add_header Cache-Control "no-cache, max-age=0, must-revalidate";
        try_files $uri $uri/ =404;
    }

    location @legacy_proxy {
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Accept-Encoding "";
        proxy_read_timeout 30s;
        proxy_connect_timeout 10s;
        proxy_ssl_server_name on;
        proxy_ssl_name serenity.agency;
        proxy_ssl_verify off;
        sub_filter_once off;
        sub_filter '<a href="/case/all"' '<a href="/case/all/"';
        sub_filter '</body>' '<script>(function(){function normalize(href){if(href==="/case/all"||href==="https://serenity.agency/case/all"||href==="http://serenity.agency/case/all")return"/case/all/";if(href==="/"||href==="https://serenity.agency/"||href==="http://serenity.agency/"||href==="https://serenity.agency"||href==="http://serenity.agency")return"/";return"";}document.addEventListener("click",function(e){var t=e.target;var a=t&&t.closest?t.closest("a[href]"):null;if(!a)return;var target=normalize(a.getAttribute("href"));if(!target)return;e.preventDefault();window.location.assign(target);},true);})();</script></body>';
        proxy_pass https://serenity_legacy_origin;
    }

    listen [::]:443 ssl ipv6only=on;
    listen 443 ssl;
    ssl_certificate /etc/letsencrypt/live/serenity.agency/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/serenity.agency/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
}

# HTTP: всегда на канонический HTTPS без www (не сохранять Host www).
server {
    listen 80;
    listen [::]:80;
    server_name serenity.agency www.serenity.agency;
    return 301 https://serenity.agency$request_uri;
}
