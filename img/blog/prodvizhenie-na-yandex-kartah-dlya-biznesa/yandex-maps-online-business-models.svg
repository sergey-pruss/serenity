<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="458" viewBox="0 0 1200 458" fill="none">
  <rect width="1200" height="458" fill="#FFFFFF"/>
